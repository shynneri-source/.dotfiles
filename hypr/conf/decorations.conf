# -----------------------------------------------------
# Decorations & Visuals
# Theme: Stealth Carbon (Dark / Matte / Deep Shadows)
# -----------------------------------------------------

general {
    gaps_in = 5
    gaps_out = 7

    border_size = 3

    col.active_border = rgba(707070ff) rgba(333333ff) 45deg

    # Inactive: Almost blends into the background (Black-ish)
    col.inactive_border = rgba(101010ff)

    layout = dwindle
    resize_on_border = false
    allow_tearing = false
}

decoration {
    # 0 Rounding = Industrial/ThinkPad aesthetic
    rounding = 3

    active_opacity = 1.0
    inactive_opacity = 0.85

    # 🌑 THE "VOID" DEPTH EFFECT
    shadow {
        enabled = true

        # Range 30 = Very wide shadow (The "Further" look)
        range = 30

        # Render power 4 = Very soft, smoky edges
        render_power = 4

        # PURE BLACK shadow with high opacity.
        # It creates a dark "halo" behind the window.
        color = rgba(00000099)

        # Inactive windows get a smaller, lighter shadow
        color_inactive = rgba(00000044)
    }

    blur {
        enabled = true
        size = 4
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        noise = 0.05 # Higher grain for that "raw sensor" look
    }
}

animations {
    enabled = true

    # ⚙️ HEAVY INDUSTRY ANIMATIONS
    # Slower, heavier movement. Matches the dark theme.
    bezier = heavy, 0.05, 0.9, 0.1, 1.0

    # Windows: Slide in with weight
    animation = windows, 1, 3, heavy, slide
    animation = windowsIn, 1, 3, heavy, slide
    animation = windowsOut, 1, 3, heavy, slide

    animation = border, 1, 10, default

    # Workspaces: Slow, deliberate slide
    animation = workspaces, 1, 3, heavy, slide
}
